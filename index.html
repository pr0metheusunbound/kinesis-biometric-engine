<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kinesis Sandbox — Стенд телеметрии</title>
        <style>
            :root {
                --bg-base: #111418;
                --bg-surface: #181c22;
                --border-color: #2c323b;
                --text-primary: #e3e6eb;
                --text-muted: #9aa0a7;
                --accent: #9aa0a7;
                --accent-hover: #b0b6bd;
            }

            body {
                background-color: var(--bg-base);
                color: var(--text-primary);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .sandbox-card {
                background-color: var(--bg-surface);
                border: 1px solid var(--border-color);
                border-radius: 6px;
                padding: 40px;
                width: 100%;
                max-width: 360px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }

            .header {
                margin-bottom: 30px;
            }

            .header h1 {
                font-size: 20px;
                font-weight: 500;
                letter-spacing: -0.5px;
                margin: 0 0 8px 0;
            }

            .header p {
                color: var(--text-muted);
                font-size: 13px;
                margin: 0;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                font-size: 12px;
                color: var(--text-muted);
                margin-bottom: 8px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .form-group input[type="text"],
            .form-group input[type="password"] {
                background-color: var(--bg-base);
                border: 1px solid var(--border-color);
                border-radius: 4px;
                color: var(--text-primary);
                box-sizing: border-box;
                font-size: 14px;
                padding: 12px;
                width: 100%;
                transition: border-color 0.2s ease;
            }

            .form-group input:focus {
                outline: none;
                border-color: var(--accent);
            }

            .checkbox-group {
                display: flex;
                align-items: center;
                margin-bottom: 25px;
                font-size: 13px;
                color: var(--text-muted);
            }

            .checkbox-group input {
                margin-right: 8px;
                accent-color: var(--accent);
            }

            .actions {
                display: flex;
                gap: 12px;
            }

            .btn {
                border: 1px solid transparent;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                padding: 12px 20px;
                flex: 1;
                transition:
                    background-color 0.2s ease,
                    border-color 0.2s ease;
            }

            .btn-primary {
                background-color: var(--accent);
                color: var(--bg-base);
            }

            .btn-primary:hover {
                background-color: var(--accent-hover);
            }

            .btn-secondary {
                background-color: transparent;
                border-color: var(--border-color);
                color: var(--text-primary);
            }

            .btn-secondary:hover {
                background-color: rgba(255, 255, 255, 0.03);
                border-color: var(--text-muted);
            }
        </style>
    </head>
    <body>
        <div class="sandbox-card">
            <div class="header">
                <h1>Kinesis Node</h1>
                <p>Интерфейс генерации поведенческих логов</p>
            </div>

            <form id="sandboxForm" onsubmit="event.preventDefault()">
                <div class="form-group">
                    <label for="username">Идентификатор (Логин)</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="user@domain.com"
                        autocomplete="off"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        autocomplete="off"
                    />
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember" />
                    <label for="remember">Доверять этому устройству</label>
                </div>

                <div class="actions">
                    <button
                        type="button"
                        class="btn btn-secondary"
                        id="btnCancel"
                    >
                        Сброс
                    </button>
                    <button
                        type="submit"
                        class="btn btn-primary"
                        id="btnSubmit"
                    >
                        Войти
                    </button>
                </div>
            </form>
        </div>

        <script src="kinesis.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const collector = new BehavioralCollector({
                    baseUrl: "http://localhost:8000", // Указываем корень нашего FastAPI бэкенда
                    flushInterval: 3000,
                    throttleMs: 50,
                });

                collector.init();
            });
        </script>
    </body>
</html>
